name: Tinify Image Action
on: [push]

jobs:
  optimize-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Tinify Image Action
        uses: namoscato/action-tinify@v1.4.0
        with:
          api_key: ${{ secrets.TINYPNG_API_KEY }}
