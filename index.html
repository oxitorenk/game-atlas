<html lang="en">

<head>

    <link rel="apple-touch-icon" href="src/img/icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#000000">

    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>
    <div id="app">
        <nav class="ios-navbar">
            <div id="navbar-left">
                <button class="ios-navbar-action hidden" id="back-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                    <span>Games</span>
                </button>
            </div>

        </nav>

        <main id="main-content">
            <div id="view-home">

                <div class="ios-search-container">
                    <div class="ios-search-bar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ios-text-secondary)"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input type="text" placeholder="Search for games, mechanics or tags..." id="search-input">
                    </div>
                    <div id="search-dropdown" class="hidden">
                        <!-- Search results will be injected here -->
                    </div>
                </div>

                <div class="ios-list-group">
                    <div id="games-list">
                        <!-- Games will be injected here -->
                    </div>
                </div>
            </div>

            <div id="view-detail" class="hidden">
                <div id="detail-parallax-container">
                    <div id="detail-hero-wrapper">
                        <img id="detail-hero" class="hero-image" src="" alt="">
                        <div id="detail-hero-overlay"></div>
                    </div>

                    <div id="detail-content">
                        <div id="detail-status"></div>
                        <div class="large-title" id="detail-name">Game Name</div>
                        <div id="detail-sections">
                            <!-- Sections will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="lightbox" class="hidden" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="">
    </div>

    <script src="src/js/app.js"></script>
</body>

</html>
